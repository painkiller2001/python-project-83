<!DOCTYPE html>
<html lang="en" style="height: 100%;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Page Analyzer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body style="margin: 0; display: flex; flex-direction: column; min-height: 100%; background-color: #ffffff; font-family: sans-serif;">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        body {
            font-family: 'Arial', monospace;
        }
    </style>

    <div style="width: 100%; height: 60px; background-color: #070118; margin: 0; display: flex; justify-content: flex-start; align-items: center; box-sizing: border-box; padding: 0 15px;">
        <a href="/" style="font-size: 20px; color: rgb(254, 255, 194); margin: 0; text-decoration: none;">Page Analyzer</a>
        <a href="/urls" style="font-size: 18px; color: rgb(189, 189, 185); text-decoration: none; margin-left: 30px;">Websites</a>
    </div>

    <br></br>

    {% block content %}{% endblock %}

    <footer style="width: 100%; border-top: 1px solid #a8a8a8; padding: 15px 0; text-align: center; margin-top: auto;">
        <a href="https://ru.hexlet.io" target="_blank" style="color: #3f0afc; text-decoration: none; font-size: 14px;">Hexlet</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</body>
</html>
